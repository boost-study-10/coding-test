# 주간 코딩테스트 집계 자동화
# 매주 월요일 09:00 KST(00:00 UTC) 실행 후 Discord로 결과 전송

name: Weekly Report

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    # - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행용

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run evaluate
        id: evaluate
        run: node scripts/evaluate.mjs

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @reports/discord-payload.json
          else
            echo "DISCORD_WEBHOOK_URL secret not set, skipping Discord notification."
          fi

      - name: Commit leaderboard & history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f leaderboard.md reports/history.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard and history [skip ci]"
          git push
